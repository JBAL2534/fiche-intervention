<!DOCTYPE html>
<html>
<head><script id="adia-local-import">
(function(){
  function nativeSet(el,val){
    var d=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value');
    d.set.call(el,val); el.dispatchEvent(new Event('input',{bubbles:true}));
  }
  function fill(label,folder){
    var nom=document.querySelector('input[placeholder="Nom PrXXXnom"]'.replace('XXX','é'));
    var dos=document.querySelector('input[placeholder="Julie"]');
    var ok=false;
    if(nom && label){ nativeSet(nom,label); ok=true; }
    if(dos && folder){ nativeSet(dos,folder); ok=true; }
    return ok;
  }
  function waitFill(label,folder,n){ if(fill(label,folder))return; if(n>0)setTimeout(function(){waitFill(label,folder,n-1);},250); }
  async function fetchPatient(){
    var urls=["http://127.0.0.1:8765/patient-admin/latest","http://localhost:8765/patient-admin/latest"];
    for(var i=0;i<urls.length;i++){
      try{ var r=await fetch(urls[i],{cache:'no-store'}); if(!r.ok) continue;
        var d=await r.json();
        var label=(d&&d.patient_label||'').toString().trim();
        var folder=(d&&d.patient_folder_id||'').toString().trim();
        if(!label && !folder) return {empty:true};
        window.__ADIA_PATIENT__={patient_label:label,patient_folder_id:folder};
        return {label:label,folder:folder};
      }catch(e){}
    }
    return null;
  }
  async function importPatient(){
    var b=document.getElementById('adia-import-btn'); if(b) b.textContent='Lecture…';
    var res=await fetchPatient();
    if(res && (res.label||res.folder)){ waitFill(res.label,res.folder,20);
      if(b){ b.textContent='✓ '+(res.label||res.folder); setTimeout(function(){b.textContent='Importer patient (ADIA)';},2600); }
    } else if(b){ b.textContent = res&&res.empty ? 'Aucun patient synchronisé (Ctrl+Alt+A)' : 'Passerelle non trouvée';
      setTimeout(function(){b.textContent='Importer patient (ADIA)';},3200); }
  }
  function addBtn(){
    if(document.getElementById('adia-import-btn')) return;
    if(!document.body) return;
    var b=document.createElement('button');
    b.id='adia-import-btn'; b.type='button'; b.textContent='Importer patient (ADIA)';
    b.style.cssText='position:fixed;right:16px;bottom:16px;z-index:99999;padding:12px 16px;font:600 14px/1 -apple-system,Segoe UI,Arial,sans-serif;color:#fff;background:#1a3e6f;border:none;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.28);cursor:pointer';
    b.addEventListener('click', importPatient);
    document.body.appendChild(b);
  }
  var iv=setInterval(function(){ if(document.body){ addBtn(); if(document.getElementById('adia-import-btn')) clearInterval(iv); } }, 400);
  setTimeout(function(){ clearInterval(iv); }, 12000);
})();
</script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ay: swap;\n  src: url(\"e15870e0-5435-4fc6-b936-266af0dd2f85\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; font-family: 'Public Sans', system-ui, sans-serif; background: #e8eef5; -webkit-font-smoothing: antialiased; }\n  input, textarea, button, select { font-family: 'Public Sans', system-ui, sans-serif; }\n  input::placeholder, textarea::placeholder { color: #9db2c8; }\n  a { color: #1560a8; }\n  a:hover { color: #0b3d6b; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<section style=\"display:flex;justify-content:center;padding:44px 40px\">\n  <div style=\"width:1040px;background:#fff;border:1px solid #d3e0ee;border-radius:16px;box-shadow:0 4px 18px rgba(11,61,107,.10);overflow:hidden\">\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;background:{{ accent }};padding:18px 28px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <span style=\"color:#cfe2f6;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase\">La Clé du Sourire<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:14px\">\n          <span style=\"color:#fff;font-size:19px;font-weight:800;letter-spacing:.02em\">Docteur Jacques BITTON<\u002Fspan>\n          <span style=\"color:#cfe2f6;font-size:13px;font-weight:600\">Chirurgie implantaire<\u002Fspan>\n          <span style=\"color:#9cc2e8;font-size:12px;font-weight:700\">Plan de traitement — v1.0<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <sc-if value=\"{{ saveMsg }}\" hint-placeholder-val=\"\"><span style=\"color:#eafff0;font-size:13px;font-weight:700;background:rgba(255,255,255,.16);padding:6px 12px;border-radius:999px\">{{ saveMsg }}<\u002Fspan><\u002Fsc-if>\n        <button sc-camel-on-click=\"{{ onImportPatient }}\" style=\"{{ newBtnStyle }}\" title=\"Lire le fichier coordonnées ADIA (nom + n° dossier)\">Importer patient<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ onSave }}\" style=\"{{ saveBtnStyle }}\">Enregistrer<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:26px 28px;display:flex;flex-direction:column;gap:22px\">\n\n      <div style=\"display:grid;grid-template-columns:1fr 150px 150px;gap:16px\">\n        <label style=\"display:flex;flex-direction:column;gap:5px;min-width:0\">\n          <span style=\"{{ labelStyle }}\">Nom &amp; prénom patient<\u002Fspan>\n          <input value=\"{{ f_nom.value }}\" sc-camel-on-input=\"{{ f_nom.onInput }}\" style=\"{{ inputStyle }}\" placeholder=\"Nom Prénom\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:5px;min-width:0\">\n          <span style=\"{{ labelStyle }}\">N° dossier<\u002Fspan>\n          <input value=\"{{ f_dossier.value }}\" sc-camel-on-input=\"{{ f_dossier.onInput }}\" style=\"{{ inputStyle }}\" placeholder=\"Julie\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:5px;min-width:0\">\n          <span style=\"{{ labelStyle }}\">Date<\u002Fspan>\n          <input value=\"{{ f_date.value }}\" sc-camel-on-input=\"{{ f_date.onInput }}\" style=\"{{ inputStyle }}\" placeholder=\"jj/mm/aaaa\">\n        <\u002Flabel>\n      <\u002Fdiv>\n\n      <label style=\"display:flex;flex-direction:column;gap:5px;min-width:0\">\n        <span style=\"{{ labelStyle }}\">Correspondant(e)<\u002Fspan>\n        <div style=\"display:flex;gap:8px;align-items:center;min-width:0\">\n          <sc-raw-select value=\"{{ f_correspondant.value }}\" sc-camel-on-change=\"{{ f_correspondant.onInput }}\" style=\"{{ selectStyle }}\">\n            <option value=\"\">— Choisir —<\u002Foption>\n            <sc-for list=\"{{ correspondents }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <option value=\"{{ c }}\">{{ c }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-select>\n          <button sc-camel-on-click=\"{{ onRemoveCorr }}\" title=\"Supprimer le correspondant sélectionné\" style=\"{{ smallRmBtnStyle }}\">✕<\u002Fbutton>\n          <input value=\"{{ newCorr }}\" sc-camel-on-input=\"{{ onNewCorr }}\" sc-camel-on-key-down=\"{{ onNewCorrKey }}\" placeholder=\"+ ajouter un correspondant\" style=\"{{ addInputStyle }}\">\n          <button sc-camel-on-click=\"{{ onAddCorr }}\" title=\"Ajouter ce correspondant\" style=\"{{ addBtnStyle }}\">+<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Flabel>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n        <label style=\"display:flex;flex-direction:column;gap:5px\">\n          <span style=\"{{ labelStyle }}\">Allergies<\u002Fspan>\n          <input value=\"{{ f_allergies.value }}\" sc-camel-on-input=\"{{ f_allergies.onInput }}\" style=\"{{ inputStyle }}\" placeholder=\"Pénicilline, latex…\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:5px\">\n          <span style=\"{{ labelStyle }}\">Antécédents (ATCD)<\u002Fspan>\n          <input value=\"{{ f_atcd.value }}\" sc-camel-on-input=\"{{ f_atcd.onInput }}\" style=\"{{ inputStyle }}\" placeholder=\"Cardio, diabète, biphosphonates…\">\n        <\u002Flabel>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:10px;background:#f6f9fc;border:1px solid #e6eef6;border-radius:10px;padding:14px 16px\">\n        <span style=\"{{ labelStyle }}\">Alertes médicales — cliquer pour activer<\u002Fspan>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;align-items:center\">\n          <sc-for list=\"{{ alerts }}\" as=\"al\" hint-placeholder-count=\"4\">\n            <span style=\"{{ paletteWrapStyle }}\">\n              <button sc-camel-on-click=\"{{ al.onToggle }}\" style=\"{{ al.chipStyle }}\">{{ al.label }}<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ al.onRemove }}\" title=\"Supprimer cette alerte\" style=\"{{ paletteRmStyle }}\">×<\u002Fbutton>\n            <\u002Fspan>\n          <\u002Fsc-for>\n          <span style=\"display:inline-flex;gap:6px;align-items:center\">\n            <input value=\"{{ newAlert }}\" sc-camel-on-input=\"{{ onNewAlert }}\" sc-camel-on-key-down=\"{{ onNewAlertKey }}\" placeholder=\"+ nouvelle alerte\" style=\"{{ addInputStyle }}\">\n            <button sc-camel-on-click=\"{{ onAddAlert }}\" style=\"{{ addBtnStyle }}\">Ajouter<\u002Fbutton>\n          <\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"height:1px;background:#e6eef6\"><\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <h2 style=\"margin:0;font-size:15px;font-weight:800;color:#0b3d6b;letter-spacing:.02em\">Odontogramme — codes des actes par dent<\u002Fh2>\n          <span style=\"{{ activeBadgeStyle }}\">{{ activeLabel }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px 28px\">\n          <div style=\"display:flex;flex-direction:column;gap:5px\">\n            <sc-for list=\"{{ bLeft }}\" as=\"r\" hint-placeholder-count=\"16\">\n              <div style=\"display:flex;align-items:center;gap:9px\">\n                <span style=\"width:26px;text-align:right;font-size:13px;font-weight:800;color:#5a7690\">{{ r.fdi }}<\u002Fspan>\n                <input value=\"{{ r.code }}\" sc-camel-on-input=\"{{ r.onInput }}\" sc-camel-on-focus=\"{{ r.onFocus }}\" style=\"{{ r.rowInputStyle }}\" placeholder=\"…\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:5px\">\n            <sc-for list=\"{{ bRight }}\" as=\"r\" hint-placeholder-count=\"16\">\n              <div style=\"display:flex;align-items:center;gap:9px\">\n                <span style=\"width:26px;text-align:right;font-size:13px;font-weight:800;color:#5a7690\">{{ r.fdi }}<\u002Fspan>\n                <input value=\"{{ r.code }}\" sc-camel-on-input=\"{{ r.onInput }}\" sc-camel-on-focus=\"{{ r.onFocus }}\" style=\"{{ r.rowInputStyle }}\" placeholder=\"…\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:2px\">\n          <span style=\"{{ labelStyle }}\">Actes fréquents — sélectionner une dent puis cliquer<\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;align-items:center\">\n            <sc-for list=\"{{ paletteTooth }}\" as=\"p\" hint-placeholder-count=\"14\">\n              <span style=\"{{ paletteWrapStyle }}\">\n                <button sc-camel-on-click=\"{{ p.onClick }}\" style=\"{{ paletteBtnStyle }}\">{{ p.label }}<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ p.onRemove }}\" title=\"Supprimer cet acte\" style=\"{{ paletteRmStyle }}\">×<\u002Fbutton>\n              <\u002Fspan>\n            <\u002Fsc-for>\n            <span style=\"display:inline-flex;gap:6px;align-items:center\">\n              <input value=\"{{ newAct }}\" sc-camel-on-input=\"{{ onNewAct }}\" sc-camel-on-key-down=\"{{ onNewActKey }}\" placeholder=\"+ nouvel acte\" style=\"{{ addInputStyle }}\">\n              <button sc-camel-on-click=\"{{ onAddAct }}\" style=\"{{ addBtnStyle }}\">Ajouter<\u002Fbutton>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"height:1px;background:#e6eef6\"><\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <h2 style=\"margin:0;font-size:15px;font-weight:800;color:#0b3d6b;letter-spacing:.02em\">Rendez-vous / séances<\u002Fh2>\n          <span style=\"{{ activeSessionBadgeStyle }}\">Séance active : {{ activeSessionLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #dbe6f1;border-radius:10px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:58px 120px 1fr 42px;background:#eef4fa;padding:9px 14px;font-size:11px;font-weight:800;letter-spacing:.06em;color:#5a7690;text-transform:uppercase\">\n            <span>Séance<\u002Fspan><span>Durée (min)<\u002Fspan><span>Actes<\u002Fspan><span><\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ sessions }}\" as=\"s\" hint-placeholder-count=\"2\">\n            <div style=\"display:grid;grid-template-columns:58px 120px 1fr 42px;align-items:center;padding:7px 14px;border-top:1px solid #eef4fa;gap:10px\">\n              <span style=\"font-size:14px;font-weight:800;color:{{ accent }}\">{{ s.num }}<\u002Fspan>\n              <input value=\"{{ s.duree }}\" sc-camel-on-input=\"{{ s.onDuree }}\" sc-camel-on-focus=\"{{ s.onActesFocus }}\" style=\"{{ s.durStyle }}\" placeholder=\"min\">\n              <input value=\"{{ s.actes }}\" sc-camel-on-input=\"{{ s.onActes }}\" sc-camel-on-focus=\"{{ s.onActesFocus }}\" style=\"{{ s.actesStyle }}\" placeholder=\"clic dent + actes ci-dessous\">\n              <button sc-camel-on-click=\"{{ s.onRemove }}\" title=\"Retirer la séance\" style=\"{{ removeBtnStyle }}\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid #eef4fa;background:#fafcfe\">\n            <button sc-camel-on-click=\"{{ onAddSession }}\" style=\"{{ addRowBtnStyle }}\">+ Ajouter une séance<\u002Fbutton>\n            <span style=\"font-size:13px;font-weight:700;color:#5a7690\">Durée totale : <span style=\"color:{{ accent }};font-weight:800\">{{ totalDuree }} min<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:8px;background:#f6f9fc;border:1px solid #e6eef6;border-radius:10px;padding:14px 16px\">\n          <span style=\"{{ labelStyle }}\">Numéros de dents — insérer dans la séance active<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <span style=\"width:78px;font-size:11px;font-weight:700;color:#8aa0b6\">Maxillaire<\u002Fspan>\n            <div style=\"display:flex;flex-wrap:wrap;gap:5px\">\n              <sc-for list=\"{{ maxNums }}\" as=\"t\" hint-placeholder-count=\"16\">\n                <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ numBtnStyle }}\">{{ t.n }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <span style=\"width:78px;font-size:11px;font-weight:700;color:#8aa0b6\">Mandibule<\u002Fspan>\n            <div style=\"display:flex;flex-wrap:wrap;gap:5px\">\n              <sc-for list=\"{{ manNums }}\" as=\"t\" hint-placeholder-count=\"16\">\n                <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ numBtnStyle }}\">{{ t.n }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"{{ labelStyle }}\">Actes fréquents — insérer dans la séance active<\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;align-items:center\">\n            <sc-for list=\"{{ paletteSession }}\" as=\"p\" hint-placeholder-count=\"14\">\n              <span style=\"{{ paletteWrapStyle }}\">\n                <button sc-camel-on-click=\"{{ p.onClick }}\" style=\"{{ paletteBtnStyle }}\">{{ p.label }}<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ p.onRemove }}\" title=\"Supprimer cet acte\" style=\"{{ paletteRmStyle }}\">×<\u002Fbutton>\n              <\u002Fspan>\n            <\u002Fsc-for>\n            <span style=\"display:inline-flex;gap:6px;align-items:center\">\n              <input value=\"{{ newAct2 }}\" sc-camel-on-input=\"{{ onNewAct2 }}\" sc-camel-on-key-down=\"{{ onNewAct2Key }}\" placeholder=\"+ nouvel acte\" style=\"{{ addInputStyle }}\">\n              <button sc-camel-on-click=\"{{ onAddAct2 }}\" style=\"{{ addBtnStyle }}\">Ajouter<\u002Fbutton>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:16px;background:#eef4fa;border:1px solid #cfe0f0;border-radius:10px;padding:14px 18px\">\n        <span style=\"font-size:14px;font-weight:800;color:#0b3d6b;letter-spacing:.02em\">FORFAIT BPRF<\u002Fspan>\n        <input value=\"{{ f_bprf.value }}\" sc-camel-on-input=\"{{ f_bprf.onInput }}\" style=\"{{ bprfInputStyle }}\" placeholder=\"\">\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <span style=\"{{ labelStyle }}\">Imagerie / compléments / observations correspondant(e)<\u002Fspan>\n        <textarea value=\"{{ f_complements.value }}\" sc-camel-on-input=\"{{ f_complements.onInput }}\" style=\"{{ areaStyle }}\" placeholder=\"Panoramique, cone beam, observations…\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1140, &quot;height&quot;: 1500 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#1560a8&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#1560a8&quot;, &quot;#0b6e8c&quot;, &quot;#37536b&quot;, &quot;#1f6f52&quot;] },\n  &quot;compact&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  DEFAULT_ACTS = ['exp','imp','impna','bprf','porcin','bovin','Biobank','pilier','cpri','bridge cpri','ccmi','bridge ccmi','découpe','séparer racines'];\n  DEFAULT_ALERTS = [['vitd','VIT D'],['tabac','TABAC'],['eliquis','ELIQUIS'],['xarelto','XARELTO']];\n  MAX_NUMS = ['18','17','16','15','14','13','12','11','21','22','23','24','25','26','27','28'];\n  MAN_NUMS = ['48','47','46','45','44','43','42','41','31','32','33','34','35','36','37','38'];\n\n  state = {\n    activeTooth: null,\n    activeSession: 0,\n    teeth: {},\n    alerts: {},\n    bprf: '',\n    p: { nom: '', dossier: '', correspondant: '', date: '', allergies: '', atcd: '', complements: '' },\n    actsList: null,\n    newAct: '', newAct2: '',\n    alertsList: null,\n    newAlert: '',\n    correspondents: [],\n    newCorr: '',\n    sessions: [{ duree: '', actes: '' }],\n    saveMsg: ''\n  };\n\n  constructor(props) {\n    super(props);\n    if (!this.state.actsList) this.state.actsList = this.DEFAULT_ACTS.slice();\n    if (!this.state.alertsList) this.state.alertsList = this.DEFAULT_ALERTS.map(([key, label]) => ({ key, label }));\n    try {\n      if (typeof window !== 'undefined' && window.__FICHE_DATA__ && typeof window.__FICHE_DATA__ === 'object') {\n        this.state = { ...this.state, ...window.__FICHE_DATA__, newAct: '', newAct2: '', newCorr: '', newAlert: '' };\n        this._fromFile = true;\n      }\n    } catch (e) {}\n    // Coordonnées injectées par la passerelle ADIA (patient affiché dans Julie)\n    try {\n      var ap = (typeof window !== 'undefined') && window.__ADIA_PATIENT__;\n      if (ap && typeof ap === 'object') {\n        var nom = ap.patient_label || ap.nom || '';\n        var dossier = ap.patient_folder_id || ap.fiche || ap.dossier || '';\n        this.state = { ...this.state, p: { ...this.state.p, nom: nom || this.state.p.nom, dossier: dossier || this.state.p.dossier } };\n      }\n    } catch (e) {}\n  }\n\n  componentDidMount() {\n    if (this._fromFile) return;\n    let restored = false;\n    try { const raw = localStorage.getItem('bitton_fiche_current'); if (raw) { const d = JSON.parse(raw); if (d && typeof d === 'object') { this.setState({ ...d, newAct: '', newAct2: '', newCorr: '', newAlert: '' }); restored = true; } } } catch (e) {}\n    if (!restored) {\n      try { const raw = localStorage.getItem('bitton_acts'); if (raw) { const a = JSON.parse(raw); if (Array.isArray(a) && a.length) this.setState({ actsList: a }); } } catch (e) {}\n      try { const raw = localStorage.getItem('bitton_alerts'); if (raw) { const a = JSON.parse(raw); if (Array.isArray(a) && a.length) this.setState(s => { const alerts = { ...s.alerts }; a.forEach(x => { if (!(x.key in alerts)) alerts[x.key] = false; }); return { alertsList: a, alerts }; }); } } catch (e) {}\n      try { const raw = localStorage.getItem('bitton_correspondents'); if (raw) { const a = JSON.parse(raw); if (Array.isArray(a) && a.length) this.setState({ correspondents: a }); } } catch (e) {}\n    }\n  }\n\n  componentDidUpdate() {\n    try { localStorage.setItem('bitton_fiche_current', JSON.stringify(this.serialize())); } catch (e) {}\n  }\n\n  serialize() {\n    const { teeth, alerts, p, bprf, sessions, actsList, alertsList, correspondents, activeTooth } = this.state;\n    return { teeth, alerts, p, bprf, sessions, actsList, alertsList, correspondents, activeTooth };\n  }\n\n  field(key) {\n    return { value: this.state.p[key] || '', onInput: (e) => { const v = e.target.value; this.setState(s => ({ p: { ...s.p, [key]: v } })); } };\n  }\n\n  setTooth(fdi, v) { this.setState(s => ({ teeth: { ...s.teeth, [fdi]: v } })); }\n  insertAct(a) {\n    const t = this.state.activeTooth; if (!t) return;\n    const cur = this.state.teeth[t] || '';\n    this.setTooth(t, cur.trim() ? cur.trim() + ' + ' + a : a);\n  }\n\n  updateSession(i, key, v) { this.setState(s => ({ sessions: s.sessions.map((x, j) => j === i ? { ...x, [key]: v } : x) })); }\n  addSession() { this.setState(s => ({ sessions: [...s.sessions, { duree: '', actes: '' }], activeSession: s.sessions.length })); }\n  removeSession(i) { this.setState(s => { const sessions = s.sessions.filter((_, j) => j !== i); let a = s.activeSession; if (a >= sessions.length) a = sessions.length - 1; if (a < 0) a = null; return { sessions, activeSession: a }; }); }\n  insertActToSession(a) { const i = this.state.activeSession; if (i == null || !this.state.sessions[i]) return; const cur = this.state.sessions[i].actes || ''; this.updateSession(i, 'actes', cur.trim() ? cur.trim() + ' + ' + a : a); }\n  insertNumToSession(n) { const i = this.state.activeSession; if (i == null || !this.state.sessions[i]) return; const cur = this.state.sessions[i].actes || ''; this.updateSession(i, 'actes', cur.trim() ? cur.trim() + ' ' + n : n); }\n\n  saveActs(list) { try { localStorage.setItem('bitton_acts', JSON.stringify(list)); } catch (e) {} }\n  addAct(field) {\n    const v = (this.state[field] || '').trim(); if (!v) return;\n    if (this.state.actsList.some(x => x.toLowerCase() === v.toLowerCase())) { this.setState({ [field]: '' }); return; }\n    const list = [...this.state.actsList, v]; this.saveActs(list);\n    this.setState({ actsList: list, [field]: '' });\n  }\n  removeAct(a) { const list = this.state.actsList.filter(x => x !== a); this.saveActs(list); this.setState({ actsList: list }); }\n\n  addAlert() {\n    const v = (this.state.newAlert || '').trim(); if (!v) return;\n    const key = 'c_' + Date.now().toString(36);\n    const list = [...this.state.alertsList, { key, label: v }];\n    try { localStorage.setItem('bitton_alerts', JSON.stringify(list)); } catch (e) {}\n    this.setState(s => ({ alertsList: list, newAlert: '', alerts: { ...s.alerts, [key]: false } }));\n  }\n  removeAlert(key) {\n    const list = this.state.alertsList.filter(a => a.key !== key);\n    try { localStorage.setItem('bitton_alerts', JSON.stringify(list)); } catch (e) {}\n    this.setState(s => { const alerts = { ...s.alerts }; delete alerts[key]; return { alertsList: list, alerts }; });\n  }\n\n  saveCorr(list) { try { localStorage.setItem('bitton_correspondents', JSON.stringify(list)); } catch (e) {} }\n  addCorr() {\n    const v = (this.state.newCorr || '').trim(); if (!v) return;\n    if (this.state.correspondents.some(x => x.toLowerCase() === v.toLowerCase())) { this.setState(s => ({ newCorr: '', p: { ...s.p, correspondant: v } })); return; }\n    const list = [...this.state.correspondents, v]; this.saveCorr(list);\n    this.setState(s => ({ correspondents: list, newCorr: '', p: { ...s.p, correspondant: v } }));\n  }\n  removeCorr() {\n    const cur = this.state.p.correspondant;\n    if (!cur) return;\n    const list = this.state.correspondents.filter(x => x !== cur); this.saveCorr(list);\n    this.setState(s => ({ correspondents: list, p: { ...s.p, correspondant: '' } }));\n  }\n\n  applyPatient(nom, dossier) {\n    this.setState(s => ({ p: { ...s.p, nom: nom || s.p.nom, dossier: dossier || s.p.dossier } }));\n  }\n  parsePatientText(text) {\n    const raw = String(text || '').replace(/^ADIA_PATIENT_ADMIN_IMPORT\\s*/i, '').trim();\n    let nom = '', dossier = '';\n    try {\n      const start = raw.indexOf('{'), end = raw.lastIndexOf('}');\n      const obj = JSON.parse(start >= 0 ? raw.slice(start, end + 1) : raw);\n      nom = obj.patient_label || obj.nom || obj.identite || obj.name || '';\n      dossier = obj.patient_folder_id || obj.fiche || obj.dossier || obj.numero || obj.id || '';\n    } catch (e) {\n      raw.split(/\\r?\\n/).forEach(line => {\n        const m = line.split(/[:=]/); if (m.length < 2) return;\n        const k = m[0].trim().toLowerCase(); const v = m.slice(1).join(':').trim(); if (!v) return;\n        if (/^(nom|patient|identite|identité|name|nom_complet|libelle|libellé)$/.test(k)) nom = nom || v;\n        if (/^(fiche|numero|numéro|num_fiche|numero_fiche|dossier|id|ref)$/.test(k)) dossier = dossier || v;\n      });\n    }\n    return { nom, dossier };\n  }\n  async importPatient() {\n    if (!window.showOpenFilePicker) { this.toast('Import direct non disponible (Chrome/Edge requis)'); return; }\n    try {\n      const [handle] = await window.showOpenFilePicker({ id: 'adia-patient-file', startIn: 'downloads', types: [{ description: 'Coordonnées ADIA', accept: { 'text/plain': ['.txt'], 'application/json': ['.json'] } }] });\n      const file = await handle.getFile(); const text = await file.text();\n      const { nom, dossier } = this.parsePatientText(text);\n      if (!nom && !dossier) { this.toast('Fichier non reconnu'); return; }\n      this.applyPatient(nom, dossier);\n      this.toast('✓ Patient importé : ' + (nom || dossier));\n    } catch (e) { if (e && e.name === 'AbortError') return; this.toast('Import impossible'); }\n  }\n  toast(msg) { this.setState({ saveMsg: msg }); clearTimeout(this._t); this._t = setTimeout(() => this.setState({ saveMsg: '' }), 2600); }\n  fileName() { const nom = (this.state.p.nom || 'patient').trim().replace(/[^\\w\\-]+/g, '_') || 'patient'; return 'Plan de traitement - ' + nom + '.html'; }\n  buildHtml() {\n    const data = JSON.stringify(this.serialize());\n    const clone = document.documentElement.cloneNode(true);\n    clone.querySelectorAll('script[data-fiche-data]').forEach(n => n.remove());\n    const s = document.createElement('script'); s.setAttribute('data-fiche-data', '');\n    s.textContent = 'window.__FICHE_DATA__=' + data + ';';\n    const head = clone.querySelector('head') || clone; head.insertBefore(s, head.firstChild);\n    return '<!DOCTYPE html>\\n' + clone.outerHTML;\n  }\n  currentFileName() {\n    try { const b = decodeURIComponent((location.pathname || '').split('/').pop() || ''); if (b && /\\.html?$/i.test(b)) return b; } catch (e) {}\n    return this.fileName();\n  }\n  async save() {\n    const html = this.buildHtml();\n    if (window.showSaveFilePicker) {\n      try {\n        if (!this._fileHandle) {\n          // Premier enregistrement : on pointe UNE fois le fichier du patient,\n          // puis ce lien est retenu -> les suivants écrivent au même endroit.\n          this._firstSave = true;\n          this._fileHandle = await window.showSaveFilePicker({ suggestedName: this.currentFileName(), id: 'fiche-devis-bitton', startIn: 'documents', types: [{ description: 'Fiche patient', accept: { 'text/html': ['.html'] } }] });\n        }\n        const w = await this._fileHandle.createWritable(); await w.write(html); await w.close();\n        const first = this._firstSave; this._firstSave = false;\n        this.toast(first ? '✓ Fichier lié — les prochains « Enregistrer » iront ici tout seuls' : '✓ Enregistré');\n        return;\n      } catch (e) { if (e && e.name === 'AbortError') return; this._fileHandle = null; }\n    }\n    const blob = new Blob([html], { type: 'text/html' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a'); a.href = url; a.download = this.fileName();\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1500);\n    this.toast('⚠ Copie téléchargée (pas le fichier du serveur)');\n  }\n  async openFiche() {\n    if (!window.showOpenFilePicker) { this.toast('Ouverture directe non disponible'); return; }\n    try {\n      const [handle] = await window.showOpenFilePicker({ id: 'fiche-devis-bitton', startIn: 'documents', types: [{ description: 'Fiche patient', accept: { 'text/html': ['.html'] } }] });\n      const file = await handle.getFile(); const text = await file.text();\n      const m = text.match(/window\\.__FICHE_DATA__\\s*=\\s*(\\{[\\s\\S]*?\\});/);\n      if (m) { const d = JSON.parse(m[1]); this._fileHandle = handle; this.setState({ ...d, newAct: '', newAct2: '', newCorr: '', newAlert: '' }); this.toast('✓ Fiche ouverte'); }\n      else { this.toast('Fichier non reconnu'); }\n    } catch (e) { if (e && e.name === 'AbortError') return; this.toast('Impossible d’ouvrir'); }\n  }\n\n  mk(fdi) {\n    const accent = this.props.accent || '#1560a8';\n    const code = this.state.teeth[fdi] || '';\n    const filled = !!code.trim();\n    const active = this.state.activeTooth === fdi;\n    const border = active ? '2px solid ' + accent : (filled ? '1.5px solid #7fb2e0' : '1px solid #cddced');\n    return {\n      fdi, code,\n      onFocus: () => this.setState({ activeTooth: fdi }),\n      onInput: (e) => this.setTooth(fdi, e.target.value),\n      rowInputStyle: { flex: 1, minWidth: 0, height: (this.props.compact ? 28 : 32) + 'px', boxSizing: 'border-box', border, background: filled ? '#e7f1fb' : '#fff', borderRadius: '6px', padding: '4px 9px', fontSize: '13px', fontWeight: 600, color: '#14304a', outline: 'none' }\n    };\n  }\n\n  renderVals() {\n    const accent = this.props.accent || '#1560a8';\n    const arr = (list) => list.map(x => this.mk(String(x)));\n    const active = this.state.activeTooth;\n    const activeLabel = active ? 'Dent ' + active + ' sélectionnée' : 'Aucune dent sélectionnée';\n\n    const labelStyle = { fontSize: '11px', fontWeight: 700, letterSpacing: '.06em', color: '#7690aa', textTransform: 'uppercase' };\n    const inputStyle = { height: '38px', boxSizing: 'border-box', border: '1px solid #cddced', borderRadius: '8px', padding: '6px 11px', fontSize: '14px', fontWeight: 500, color: '#14304a', outline: 'none', background: '#fff' };\n    const areaStyle = { minHeight: '66px', boxSizing: 'border-box', border: '1px solid #cddced', borderRadius: '8px', padding: '8px 11px', fontSize: '13px', color: '#14304a', outline: 'none', resize: 'vertical', fontFamily: \"'Public Sans', sans-serif\", lineHeight: 1.4 };\n    const bprfInputStyle = { flex: 1, maxWidth: '260px', height: '40px', boxSizing: 'border-box', border: '1px solid #b7cee6', borderRadius: '8px', padding: '6px 12px', fontSize: '15px', fontWeight: 700, color: '#0b3d6b', outline: 'none', background: '#fff' };\n\n    const alerts = this.state.alertsList.map(it => {\n      const on = !!this.state.alerts[it.key];\n      return {\n        key: it.key, label: it.label,\n        onToggle: () => this.setState(s => ({ alerts: { ...s.alerts, [it.key]: !s.alerts[it.key] } })),\n        onRemove: () => this.removeAlert(it.key),\n        chipStyle: { cursor: 'pointer', border: on ? '1.5px solid #c0392b' : '1.5px solid #d3e0ee', background: on ? '#fdecea' : '#fff', color: on ? '#a5281b' : '#6a839c', fontSize: '13px', fontWeight: 700, padding: '7px 13px', borderRadius: '999px', outline: 'none' }\n      };\n    });\n\n    const paletteBtnStyle = { cursor: 'pointer', border: '1px solid #cfe0f0', background: '#f2f8fd', color: accent, fontSize: '13px', fontWeight: 700, padding: '7px 12px', borderRadius: '7px', outline: 'none' };\n    const paletteTooth = this.state.actsList.map(a => ({ label: a, onClick: () => this.insertAct(a), onRemove: () => this.removeAct(a) }));\n    const paletteSession = this.state.actsList.map(a => ({ label: a, onClick: () => this.insertActToSession(a), onRemove: () => this.removeAct(a) }));\n    const maxNums = this.MAX_NUMS.map(n => ({ n, onClick: () => this.insertNumToSession(n) }));\n    const manNums = this.MAN_NUMS.map(n => ({ n, onClick: () => this.insertNumToSession(n) }));\n\n    const paletteWrapStyle = { display: 'inline-flex', alignItems: 'center', gap: '2px' };\n    const paletteRmStyle = { cursor: 'pointer', border: 'none', background: 'transparent', color: '#b0728a', fontSize: '16px', fontWeight: 800, lineHeight: 1, padding: '0 4px', outline: 'none' };\n    const addInputStyle = { width: '128px', minWidth: 0, flex: '0 1 200px', height: '32px', boxSizing: 'border-box', border: '1px dashed #b6cbe0', borderRadius: '7px', padding: '4px 10px', fontSize: '13px', color: '#14304a', outline: 'none', background: '#fff' };\n    const addBtnStyle = { cursor: 'pointer', border: 'none', background: accent, color: '#fff', fontSize: '13px', fontWeight: 700, padding: '7px 13px', borderRadius: '7px', outline: 'none' };\n    const smallRmBtnStyle = { cursor: 'pointer', border: '1px solid #e4c4cf', background: '#fdf1f4', color: '#b0728a', width: '32px', height: '32px', borderRadius: '7px', fontSize: '13px', fontWeight: 800, outline: 'none' };\n    co
